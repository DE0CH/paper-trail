# TEMP focused red/green for the decoded-image retention fix (deleted
# before merge). Red reverts the destroyPage cleanup() hunk and must FAIL
# the new retention test; green runs the branch as-is and must PASS.

name: Focus scan retention (temp)

on:
  push:
    branches: ['mem-cleanup']

permissions:
  contents: read

jobs:
  green:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install pillow
      - run: npm ci
      - run: npm run build
      - run: node build-node/tools/fixture.js
      - run: python src/tools/gen_scanned_fixture.py
      - name: Retention test (fix applied — must PASS)
        shell: bash
        run: |
          node build-node/node/server.js 8377 &
          for i in $(seq 1 60); do curl -s -o /dev/null http://127.0.0.1:8377/ && break; sleep 0.5; done
          node build-node/test/scannedRetention.js
      - name: Scanned pages still render (no regression)
        shell: bash
        run: node build-node/test/scannedBlank.js

  red:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install pillow
      - name: Revert the cleanup() hunk (bug restored)
        shell: bash
        run: |
          python - <<'EOF'
          from pathlib import Path
          p = Path('src/core/viewer.ts')
          t = p.read_text()
          start = t.index('    // Release pdf.js\'s decoded-image cache')
          end = t.index('  }', t.index('p.page.cleanup()'))
          t = t[:start] + t[end:]
          assert 'page.cleanup()' not in t
          p.write_text(t)
          EOF
      - run: npm ci
      - run: npm run build
      - run: node build-node/tools/fixture.js
      - run: python src/tools/gen_scanned_fixture.py
      - name: Retention test (fix reverted — must FAIL)
        shell: bash
        run: |
          node build-node/node/server.js 8377 &
          for i in $(seq 1 60); do curl -s -o /dev/null http://127.0.0.1:8377/ && break; sleep 0.5; done
          if node build-node/test/scannedRetention.js; then
            echo "::error::retention test PASSED with the fix reverted - the test does not pin the bug"
            exit 1
          else
            echo "red confirmed: unbounded retention detected without cleanup()"
          fi
