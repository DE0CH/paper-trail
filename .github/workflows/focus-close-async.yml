# DEV-ONLY — delete at merge. Fast red/green for the async close-and-save test
# on Depot mac. MIRROR-GATED (never runs the full CI on GitHub) and only fires
# on the close-async-** branch prefix.
name: Focus close-async

on:
  push:
    branches: ['close-async-**']

permissions:
  contents: read

jobs:
  close-async:
    if: ${{ github.repository_owner == 'de0ch-org' }}
    runs-on: depot-macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build
      - name: Generate the test-fixture PDF
        run: node build-node/tools/fixture.js
      - name: Async close-and-save (real handle via OPFS)
        run: npx electron build-node/test/desktopCloseAsync.js
