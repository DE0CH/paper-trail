# Focused single-test witness for the close-first-save-after behaviour:
# builds and runs ONLY desktopCloseAutosave on a mac runner (has a display,
# no xvfb). Watch RED (fix reverted) and GREEN (fix applied) at once. The
# close logic is platform-agnostic; one OS witnesses it. Branch-scoped push
# + dispatch — a brand-new workflow can't be dispatched by name off the
# default branch, so the witness refs trigger it by push.
name: Witness close autosave

on:
  workflow_dispatch: {}
  push:
    branches: [witness-close-autosave-red, witness-close-autosave-green]

jobs:
  witness:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build
      - name: Close with autosave on — no prompt, background flush
        if: ${{ !cancelled() }}
        run: npx electron build-node/test/desktopCloseAutosave.js
      - name: A failed auto-save keeps the session dirty (no silent loss)
        if: ${{ !cancelled() }}
        run: npx electron build-node/test/desktopWriteFailKeepsDirty.js
