# Records the README media (demo.mp4 + screenshots) on a Windows
# runner AGAINST THE DESKTOP APP: the real Electron window on the
# runner's screen, captured with ffmpeg so the recording includes the
# genuine window chrome and top toolbar. The generator verifies the
# recording programmatically (distinct labels, trail depth, branch
# count); after infrastructure changes the frames are additionally
# reviewed visually before the result is trusted. Media is committed
# back and also uploaded as an artifact for review.

name: Record README media

on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: record-media
  cancel-in-progress: false

jobs:
  record:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - run: npm ci

      - run: npm run build

      - name: Generate the test-fixture PDFs
        run: node build-node/tools/fixture.js

      - name: Fetch the demo paper (arXiv 2411.01678)
        shell: bash
        run: |
          mkdir -p sample/real
          curl -fsSL --retry 3 -o sample/real/WStarCats.pdf \
            "https://arxiv.org/pdf/2411.01678v1"
          test -s sample/real/WStarCats.pdf

      - name: Raise the display resolution
        shell: pwsh
        run: Set-DisplayResolution -Width 1920 -Height 1080 -Force

      - name: Ensure ffmpeg
        shell: pwsh
        run: |
          if (-not (Get-Command ffmpeg -ErrorAction SilentlyContinue)) {
            choco install ffmpeg -y --no-progress
          }

      - name: Record and verify the media against the desktop app
        shell: bash
        run: node build-node/tools/mediaDesktop.js

      - name: Upload the media for review (also on failure — the
              capture is the diagnostic)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: readme-media
          path: docs/media/

      - name: Commit the media
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/media
          if git diff --cached --quiet; then
            echo "media unchanged"
            exit 0
          fi
          git commit -m "Record README media on CI [skip actions]"
          git pull --rebase origin main
          git push
