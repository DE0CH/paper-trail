# Records the Software Update window's state walkthrough on a mac
# runner (manual trigger) for owner review: the real update.html UI
# driven through checking / available / downloading / ready / up to
# date / error. Uploads capturePage frames (always) and a native
# screencapture movie (best effort).

name: macOS update UI recording

on:
  workflow_dispatch: {}

jobs:
  record:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build

      - name: Serve the web build
        run: |
          node build-node/node/server.js 8377 &
          for i in $(seq 1 60); do
            curl -s -o /dev/null http://127.0.0.1:8377/ && break
            sleep 0.5
          done

      - name: Drive the update window through its states, recording
        run: npx electron build-node/tools/updateUiDemo.js

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mac-update-ui
          path: |
            update-ui-frames/
            update-ui.mov
