# Windows build + full e2e suite + packaged-app smoke test.
# The e2e suite emulates a user against the real app in a headless Edge
# that ships on the runner image, so this is the Windows "interactive"
# testing loop — just with a longer round trip than local.

name: CI

on:
  push:
    branches: [main]
  pull_request: {}
  workflow_dispatch: {}

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - run: npm ci

      - run: npm run build

      - name: Generate the test-fixture PDF
        run: node build-node/tools/fixture.js

      - name: Run unit tests
        run: node --test build-node/test/unit.js

      - name: Run e2e suite against the built app
        shell: bash
        run: |
          node build-node/node/server.js 8377 &
          for i in $(seq 1 60); do
            curl -s -o /dev/null http://127.0.0.1:8377/ && break
            sleep 0.5
          done
          node build-node/test/e2e.js

      - name: Package Windows app (unsigned)
        env:
          # 7-Zip ≥22 applies the ARM64 branch filter to arm64 binaries,
          # which the NSIS extractor plugin can't decode — installs on ARM
          # machines silently dropped every exe/dll. BCJ2 is understood.
          ELECTRON_BUILDER_7Z_FILTER: BCJ2
        run: npx electron-builder --win --publish never

      - name: Smoke-test the packaged app
        shell: bash
        run: |
          "./dist-electron/win-unpacked/Paper Trail.exe" --smoke

      - name: Desktop save regression (menu actions without user activation)
        shell: bash
        run: npx electron build-node/test/desktopSave.js

      - name: Desktop offline regression (no network requests at all)
        shell: bash
        run: npx electron build-node/test/desktopOffline.js

      - name: Full e2e suite against the desktop app, offline
        shell: bash
        run: node build-node/test/desktopE2e.js

      - name: Desktop auto-save regression (Recents re-arm auto-save)
        shell: bash
        run: npx electron build-node/test/desktopAutosave.js

      - name: Installer test (install, shortcuts, smoke, uninstall)
        shell: bash
        run: node build-node/test/installerWin.js

      - name: Upload the installer for the ARM job
        uses: actions/upload-artifact@v4
        with:
          name: win-setup
          path: dist-electron/*Setup*.exe

      - name: List artifacts
        shell: bash
        run: ls -la dist-electron/*.exe dist-electron/*.zip

  # The universal mac app on both CPU families: the dmg a user drags to
  # Applications and the zip auto-update installs, each smoke-tested
  # natively on its architecture.
  mac-install:
    strategy:
      matrix:
        runner: [macos-latest, macos-15-intel]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - run: npm ci

      - run: npm run build

      - name: Package macOS app (unsigned)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --mac --publish never -c.mac.notarize=false

      - name: Installer test (dmg, zip, universal binary, smoke)
        run: node build-node/test/installerMac.js

  # The one Setup.exe serves x64 and ARM machines; this job installs the
  # exact installer the x64 job built (the same shape a release ships)
  # on an ARM machine, which is the only way to exercise the ARM payload.
  windows-arm:
    needs: windows
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - run: npm ci

      - name: Compile the node-side tests
        run: npx tsc -p tsconfig.node.json

      - name: Fetch the installer built by the x64 job
        uses: actions/download-artifact@v4
        with:
          name: win-setup
          path: dist-electron

      - name: Installer test (install, shortcuts, smoke, uninstall)
        shell: bash
        run: node build-node/test/installerWin.js
