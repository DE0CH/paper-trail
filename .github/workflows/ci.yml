# The full test pyramid on every OS/CPU combination users run. Windows
# and macOS need different steps (different packaging and installer
# tests), so each has its own job — and each job runs on both CPU
# architectures via a runner matrix.

name: CI

on:
  push:
    # main only — per-branch push CI was too costly (owner). Feature
    # branches validate on demand via workflow_dispatch or a push to the
    # de0ch-org Depot mirror; tags run this via the release workflow_call.
    branches: [main]
  pull_request: {}
  workflow_dispatch: {}
  # the release workflow runs this full pyramid first and publishes
  # only when every job passes
  workflow_call: {}

jobs:
  windows:
    strategy:
      fail-fast: false
      matrix:
        runner: [windows-latest, windows-11-arm]
    # Public repo (de0ch): both CPU arches, GitHub-hosted. Private mirror
    # (de0ch-org): x64 on Depot, arm stays github-hosted. STATIC matrix +
    # owner-keyed runs-on ON PURPOSE — a fromJSON matrix expression
    # startup-fails the release's workflow_call (push worked, tag didn't).
    # Windows always runs on GitHub-hosted runners, never Depot: Depot's
    # ephemeral Windows has no interactive desktop session, so the electron
    # desktop-GUI e2e tests can't launch there. Depot handles Mac/Linux;
    # Windows stays on GitHub (owner policy). main runs everything here anyway.
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      # the Codecov upload authenticates via GitHub OIDC (no token secret)
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - run: npm ci

      - run: npm run build

      - name: Generate the test-fixture PDFs
        run: node build-node/tools/fixture.js

      - name: Unit tests
        run: node --test build-node/test/unit.js

      - name: Unit edge cases (hostile session files, model invariants)
        if: ${{ !cancelled() }}
        run: node --test build-node/test/unitEdges.js

      - name: Unit tests — canvas render-geometry caps
        if: ${{ !cancelled() }}
        run: node --test build-node/test/renderGeometryUnit.js

      - name: Unit test coverage (src/core)
        if: ${{ !cancelled() }}
        shell: bash
        run: npm run coverage

      - name: Upload coverage to Codecov
        # one leg is enough — the numbers are platform-independent. Only on
        # the canonical public repo: the private Depot mirror
        # (de0ch-org/paper-trail-mirror) isn't registered with Codecov, so
        # the upload there fails "Repository not found" and, with
        # fail_ci_if_error, would fail every mirror/Depot dev run.
        if: ${{ !cancelled() && matrix.runner == 'windows-latest' && github.repository == 'de0ch/paper-trail' }}
        uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov.info
          use_oidc: true
          # a rejected upload must be a red step, not a silent skip
          # (a pre-activation upload failed invisibly once)
          fail_ci_if_error: true

      # The server outlives its step (runners keep background processes
      # until the job ends), so every browser suite below gets its own
      # pass/fail row while sharing one server.
      - name: Start the web server for the browser suites
        if: ${{ !cancelled() }}
        shell: bash
        run: |
          node build-node/node/server.js 8377 &
          for i in $(seq 1 60); do
            curl -s -o /dev/null http://127.0.0.1:8377/ && break
            sleep 0.5
          done
          node build-node/tools/geometry.js

      - name: Browser e2e suite
        if: ${{ !cancelled() }}
        shell: bash
        run: node build-node/test/e2e.js

      - name: Browser edge cases
        if: ${{ !cancelled() }}
        shell: bash
        run: node build-node/test/e2eEdges.js

      - name: Native dark scrollbars (rail and arrows intact)
        if: ${{ !cancelled() }}
        shell: bash
        run: node build-node/test/darkScrollbars.js

      - name: Panel rows and headers share one layout system
        if: ${{ !cancelled() }}
        shell: bash
        run: node build-node/test/trailRowLayout.js

      - name: No stray focus rings, no Tab cycling
        if: ${{ !cancelled() }}
        shell: bash
        run: node build-node/test/focusRing.js

      - name: The preview popup stays inside the window
        if: ${{ !cancelled() }}
        shell: bash
        run: node build-node/test/previewClamp.js

      - name: The preview survives an annotation-layer rebuild
        if: ${{ !cancelled() }}
        shell: bash
        run: node build-node/test/previewRebuild.js

      - name: A large scale jump leaves no ghost page (destroyed canvas removed)
        if: ${{ !cancelled() }}
        shell: bash
        run: node build-node/test/ghostPageAfterFit.js

      - name: A no-anchor zoom stays horizontally centered across the fit boundary
        if: ${{ !cancelled() }}
        shell: bash
        run: node build-node/test/offCenterZoom.js

      - name: A huge page at high zoom renders within the canvas caps (not blank)
        if: ${{ !cancelled() }}
        shell: bash
        run: node build-node/test/hugePageZoomBlank.js

      - name: A persistently failing page render does not retry-storm
        if: ${{ !cancelled() }}
        shell: bash
        run: node build-node/test/renderRetryStorm.js

      - name: Replace PDF with a same-named file refreshes the thumbnails
        if: ${{ !cancelled() }}
        shell: bash
        run: node build-node/test/staleThumbsAfterReplace.js

      - name: Pinch-gesture state does not survive a document swap
        if: ${{ !cancelled() }}
        shell: bash
        run: node build-node/test/pinchDocSwap.js

      - name: A devicePixelRatio change re-renders the visible pages
        if: ${{ !cancelled() }}
        shell: bash
        run: node build-node/test/dprChangeRerender.js

      - name: Search entries commit on the right actions and only those
        if: ${{ !cancelled() }}
        shell: bash
        run: node build-node/test/searchCommitState.js

      - name: The rename input never shifts the text (no-jank)
        if: ${{ !cancelled() }}
        shell: bash
        run: node build-node/test/renameNoShift.js

      - name: Rapid-action race conditions stay consistent (CPU-throttled)
        if: ${{ !cancelled() }}
        shell: bash
        run: node build-node/test/raceConditions.js

      - name: Every open method binds the same silent-write target
        if: ${{ !cancelled() }}
        shell: bash
        run: node build-node/test/dropBindsSilentTarget.js

      - name: Toolbar controls + list rows stay aligned (measured)
        if: ${{ !cancelled() }}
        shell: bash
        run: node build-node/test/uiAlignment.js

      - name: Desktop e2e suite (Electron shell, fully offline)
        if: ${{ !cancelled() }}
        shell: bash
        run: node build-node/test/desktopE2e.js

      - name: Real drag-drop binds the on-disk path (no getPathForFile stub)
        if: ${{ !cancelled() }}
        shell: bash
        run: node build-node/test/desktopDropBinds.js

      - name: Right-click "Search for this" fills the find box
        if: ${{ !cancelled() }}
        shell: bash
        run: node build-node/test/searchSelectionBox.js

      - name: Desktop save regression (menu actions without user activation)
        if: ${{ !cancelled() }}
        shell: bash
        run: npx electron build-node/test/desktopSave.js

      - name: Saving a session never registers it with the OS Open-Recent (TCC prompt)
        if: ${{ !cancelled() }}
        shell: bash
        run: npx electron build-node/test/desktopNoRecentDoc.js

      - name: Desktop offline regression (no network requests at all)
        if: ${{ !cancelled() }}
        shell: bash
        run: npx electron build-node/test/desktopOffline.js

      - name: Desktop auto-save regression (Recents re-arm auto-save)
        if: ${{ !cancelled() }}
        shell: bash
        run: npx electron build-node/test/desktopAutosave.js

      - name: Close with autosave on — no prompt, background flush
        if: ${{ !cancelled() }}
        shell: bash
        run: npx electron build-node/test/desktopCloseAutosave.js

      - name: Async close-and-save — a handle-bound session closes silently too
        if: ${{ !cancelled() }}
        shell: bash
        run: npx electron build-node/test/desktopCloseAsync.js

      - name: OS shutdown is vetoed while a session is unsaved
        if: ${{ !cancelled() }}
        shell: bash
        run: npx electron build-node/test/desktopShutdownGuard.js

      - name: A failed auto-save keeps the session dirty (no silent loss)
        if: ${{ !cancelled() }}
        shell: bash
        run: npx electron build-node/test/desktopWriteFailKeepsDirty.js

      - name: Cancel on the unsaved-close dialog keeps the window open
        if: ${{ !cancelled() }}
        shell: bash
        run: npx electron build-node/test/desktopCloseCancelKeepsWindow.js

      - name: OS-opened session binds to its file path (auto-save + Save)
        if: ${{ !cancelled() }}
        shell: bash
        run: npx electron build-node/test/desktopSessionPathBind.js

      - name: Desktop edge cases (open routing, external links, bounds)
        if: ${{ !cancelled() }}
        shell: bash
        run: npx electron build-node/test/desktopEdges.js

      - name: OS-open shows no empty flash and reuses empty windows
        # Independent of the browser suites: report it even when they
        # fail, so one run carries the full picture.
        if: ${{ !cancelled() }}
        shell: bash
        run: npx electron build-node/test/osOpenFlash.js

      - name: A derived (URL) title never reveals an empty window
        if: ${{ !cancelled() }}
        shell: bash
        run: npx electron build-node/test/osOpenDerivedTitle.js

      - name: A double-clicked .ptl session reveals its window at once
        if: ${{ !cancelled() }}
        shell: bash
        run: npx electron build-node/test/osOpenSessionReveal.js

      - name: Jump List New Window task opens a fresh window
        if: ${{ !cancelled() }}
        shell: bash
        run: npx electron build-node/test/newWindowTask.js

      - name: Jump List registration carries the New Window task (right identity)
        if: ${{ !cancelled() }}
        shell: bash
        run: npx electron build-node/test/jumpListRegistration.js

      - name: Package the Windows app (unsigned)
        env:
          # 7-Zip ≥22 applies the ARM64 branch filter to arm64 binaries,
          # which the NSIS extractor plugin can't decode — installs on ARM
          # machines silently dropped every exe/dll. BCJ2 is understood.
          ELECTRON_BUILDER_7Z_FILTER: BCJ2
        run: npx electron-builder --win --publish never

      - name: Smoke-test the packaged app
        shell: bash
        run: |
          "./dist-electron/win-unpacked/Paper Trail.exe" --smoke

      - name: Update-feed names match the packaged artifacts
        shell: bash
        run: node build-node/test/updateFeedNames.js dist-electron

      - name: Installer declares DPI awareness (no HiDPI pixelation)
        shell: bash
        run: node build-node/test/installerDpiAware.js

      - name: Installer test (install, shortcuts, smoke, uninstall)
        shell: bash
        run: node build-node/test/installerWin.js

      - name: Documents get their own icons, never the app's
        # no !cancelled() — it installs the packaged Setup exe, so it
        # must skip (like the other installer tests) when packaging did
        shell: bash
        run: node build-node/test/winDocIcons.js

      - name: Installer never force-closes a running app (unsaved work wins)
        shell: bash
        run: node build-node/test/installerCloseUnsaved.js

  # Update tests live in their own job so their two packaging runs
  # (current version + next-version feed) don't serialize behind the
  # main job's steps — jobs run in parallel, steps within one don't.
  windows-update:
    strategy:
      fail-fast: false
      matrix:
        runner: [windows-latest, windows-11-arm]
    # Public repo (de0ch): both CPU arches, GitHub-hosted. Private mirror
    # (de0ch-org): x64 on Depot, arm stays github-hosted. STATIC matrix +
    # owner-keyed runs-on ON PURPOSE — a fromJSON matrix expression
    # startup-fails the release's workflow_call (push worked, tag didn't).
    # Windows always runs on GitHub-hosted runners, never Depot: Depot's
    # ephemeral Windows has no interactive desktop session, so the electron
    # desktop-GUI e2e tests can't launch there. Depot handles Mac/Linux;
    # Windows stays on GitHub (owner policy). main runs everything here anyway.
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - run: npm ci

      - run: npm run build

      - name: Generate the test-fixture PDFs
        run: node build-node/tools/fixture.js

      - name: Package the current version (installer only)
        env:
          ELECTRON_BUILDER_7Z_FILTER: BCJ2
        run: npx electron-builder --win nsis --publish never

      - name: Build the next version into the update feed
        env:
          ELECTRON_BUILDER_7Z_FILTER: BCJ2
        shell: bash
        run: |
          npm version patch --no-git-tag-version
          npx electron-builder --win nsis --publish never -c.directories.output=dist-update-feed
          git checkout -- package.json package-lock.json

      - name: Update-feed names match the packaged artifacts
        shell: bash
        run: node build-node/test/updateFeedNames.js dist-electron dist-update-feed

      - name: Auto-update test (real install-update-install cycle)
        shell: bash
        run: node build-node/test/updateWin.js

      - name: Install-on-quit test (background download, normal quit)
        shell: bash
        run: node build-node/test/updateWinQuitInstall.js

      - name: Double-click a PDF against a quit-installed update
        if: ${{ !cancelled() }}
        shell: bash
        run: node build-node/test/updateWinOpenAfterUpdate.js

      - name: Resilience — hard kill during the install
        if: ${{ !cancelled() }}
        shell: bash
        run: node build-node/test/updateWinKillDuringInstall.js

  mac:
    strategy:
      fail-fast: false
      matrix:
        runner: [macos-latest, macos-15-intel]
    # Public repo (de0ch): both CPU arches, GitHub-hosted. Private mirror
    # (de0ch-org): Apple-silicon on Depot, Intel stays github-hosted.
