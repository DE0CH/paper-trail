  # Same parallel split as windows-update: the update tests build twice
  # (current app + next-version feed), so they get their own job.
  # Builds are code-signed when the secret is available (not on fork
  # PRs), which lets Squirrel.Mac's real install run too; unsigned
  # builds still cover find-download and the manual menu flow.
  mac-update:
    strategy:
      fail-fast: false
      matrix:
        runner: [macos-latest, macos-15-intel]
    # Public repo (de0ch): both CPU arches, GitHub-hosted. Private mirror
    # (de0ch-org): Apple-silicon on Depot, Intel stays github-hosted.
    # STATIC matrix + owner-keyed runs-on — a fromJSON matrix expression
    # startup-fails the release's workflow_call.
    runs-on: ${{ github.repository_owner == 'de0ch-org' && (matrix.runner == 'macos-latest' && 'depot-macos-latest' || matrix.runner) || matrix.runner }}
    env:
      HAS_CERT: ${{ secrets.MAC_CERT_P12 != '' }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - run: npm ci

      - run: npm run build

      - name: Generate the test-fixture PDFs
        run: node build-node/tools/fixture.js

      - name: Package the current version (zip only)
        env:
          CSC_LINK: ${{ secrets.MAC_CERT_P12 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
        shell: bash
        run: |
          if [ "$HAS_CERT" != "true" ]; then
            unset CSC_LINK CSC_KEY_PASSWORD
            export CSC_IDENTITY_AUTO_DISCOVERY=false
          fi
          # timestamp=none: skip Apple's timestamp authority — its flakes
          # fail builds, and a secure timestamp only matters for keeping
          # signatures valid after cert expiry (irrelevant to test builds)
          npx electron-builder --mac zip --publish never -c.mac.notarize=false -c.mac.timestamp=none

      - name: Build the next version into the update feed
        env:
          CSC_LINK: ${{ secrets.MAC_CERT_P12 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
        shell: bash
        run: |
          if [ "$HAS_CERT" != "true" ]; then
            unset CSC_LINK CSC_KEY_PASSWORD
            export CSC_IDENTITY_AUTO_DISCOVERY=false
          fi
          npm version patch --no-git-tag-version
          npx electron-builder --mac zip --publish never -c.mac.notarize=false -c.mac.timestamp=none -c.directories.output=dist-update-feed
          git checkout -- package.json package-lock.json

      - name: Update-feed names match the packaged artifacts
        run: node build-node/test/updateFeedNames.js dist-electron dist-update-feed

      - name: Closed-stdio regression (Finder launches must not crash)
        run: node build-node/test/desktopStdioClosed.js

      # LAST: this one replaces the packaged bundle with the new version,
      # so every test needing the current version must run before it.
      - name: Auto-update install test (Squirrel, signed builds only)
        if: env.HAS_CERT == 'true'
        run: node build-node/test/updateMacInstall.js

