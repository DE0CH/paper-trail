# TEMPORARY focused witness for the open-routing/window-management batch:
# builds and runs ONLY the four new shell witnesses plus the pure-helper
# unit tests, on both desktop OSes. Used to watch the regressions RED
# (fixes absent) and GREEN (fixes applied) side by side. Branch-scoped
# push + dispatch — a brand-new workflow can't be dispatched by name off
# the default branch, so the witness refs trigger it by push.
# DELETE this file before the branch merges; the lasting steps live in ci.yml.
name: Focus open routing

on:
  workflow_dispatch: {}
  push:
    branches: [witness-open-routing-red, witness-open-routing-green]

jobs:
  witness:
    strategy:
      fail-fast: false
      matrix:
        runner: [windows-latest, macos-latest]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build
      - name: Shell helper unit tests (bounds placement, argv resolution)
        if: ${{ !cancelled() }}
        shell: bash
        run: node --test build-node/test/desktopShellUnit.js
      - name: Two quick OS opens land in two windows, one doc each
        if: ${{ !cancelled() }}
        shell: bash
        run: npx electron build-node/test/osOpenTwoQuick.js
      - name: A relative CLI path resolves against the caller's directory
        if: ${{ !cancelled() }}
        shell: bash
        run: npx electron build-node/test/secondInstanceCwd.js
      - name: A second-instance file open restores a minimized window
        if: ${{ !cancelled() }}
        shell: bash
        run: npx electron build-node/test/secondInstanceReveal.js
      - name: Off-screen remembered bounds land back on a real display
        if: ${{ !cancelled() }}
        shell: bash
        run: npx electron build-node/test/restoreOffscreenBounds.js
