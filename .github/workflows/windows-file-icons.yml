# Captures what Windows Explorer actually shows for the app's file
# associations (manual trigger) so the document icons can be reviewed
# without a Windows machine: packages the NSIS installer, installs it
# silently, drops sample .pdf/.ptl files on the Desktop, and
# screenshots an Explorer window in extra-large-icons view.

name: Windows file-icon screenshot

on:
  workflow_dispatch: {}

jobs:
  screenshot:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build
      - name: Generate the test-fixture PDFs
        run: node build-node/tools/fixture.js

      - name: Package the Windows installer
        env:
          ELECTRON_BUILDER_7Z_FILTER: BCJ2
        run: npx electron-builder --win nsis --publish never

      - name: Install silently and refresh the icon cache
        shell: pwsh
        run: |
          $setup = Get-ChildItem dist-electron -Filter 'Paper-Trail-Setup-*.exe' | Select-Object -First 1
          Start-Process -FilePath $setup.FullName -ArgumentList '/S' -Wait
          Start-Sleep -Seconds 5
          # Explorer draws the EFFECTIVE handler's icon, and Edge owns
          # .pdf via the hash-protected UserChoice key. Deleting the key
          # (allowed; only writing needs the hash) makes resolution fall
          # back to the installer's ProgID — the state a user reaches by
          # choosing "Always open with Paper Trail".
          $fileExts = 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\FileExts'
          foreach ($ext in '.pdf', '.ptl') {
            Remove-Item -Path "$fileExts\$ext\UserChoice" -Recurse -Force -ErrorAction SilentlyContinue
          }
          Stop-Process -Name explorer -Force -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 5
          ie4uinit.exe -show
          Start-Sleep -Seconds 3

      - name: Render each file's shell icon at jumbo size (what Explorer draws)
        shell: pwsh
        run: |
          Copy-Item sample/WStarCats.pdf "$env:USERPROFILE\Desktop\Sample Paper.pdf" -Force
          Copy-Item sample/WStarCats.ptl "$env:USERPROFILE\Desktop\Sample Session.ptl" -Force
          $setup = Get-ChildItem dist-electron -Filter 'Paper-Trail-Setup-*.exe' | Select-Object -First 1
          Copy-Item $setup.FullName "$env:USERPROFILE\Desktop\$($setup.Name)" -Force
          Add-Type -ReferencedAssemblies System.Drawing -TypeDefinition @'
          using System;
          using System.Runtime.InteropServices;
          public class JumboIcon {
            [StructLayout(LayoutKind.Sequential, CharSet = CharSet.Unicode)]
            public struct SHFILEINFO {
              public IntPtr hIcon; public int iIcon; public uint dwAttributes;
              [MarshalAs(UnmanagedType.ByValTStr, SizeConst = 260)] public string szDisplayName;
              [MarshalAs(UnmanagedType.ByValTStr, SizeConst = 80)] public string szTypeName;
            }
            [DllImport("shell32.dll", CharSet = CharSet.Unicode)]
            public static extern IntPtr SHGetFileInfo(string p, uint a, ref SHFILEINFO s, uint cb, uint f);
            [DllImport("shell32.dll", EntryPoint = "#727")]
            public static extern int SHGetImageList(int list, ref Guid riid, out IImageList ppv);
            [ComImport, Guid("46EB5926-582E-4017-9FDF-E8998DAA0950"),
             InterfaceType(ComInterfaceType.InterfaceIsIUnknown)]
            public interface IImageList {
              void _0(); void _1(); void _2(); void _3(); void _4(); void _5(); void _6();
              void GetIcon(int i, int flags, out IntPtr hIcon);   // vtable slot 8
            }
            public static IntPtr Get(string path) {
              SHFILEINFO sfi = new SHFILEINFO();
              SHGetFileInfo(path, 0, ref sfi, (uint)Marshal.SizeOf(sfi), 0x4000); // SYSICONINDEX
              Guid g = new Guid("46EB5926-582E-4017-9FDF-E8998DAA0950");
              IImageList list; SHGetImageList(0x4, ref g, out list);              // SHIL_JUMBO
              IntPtr h; list.GetIcon(sfi.iIcon, 1, out h);                         // ILD_TRANSPARENT
              return h;
            }
          }
          '@
          Add-Type -AssemblyName System.Drawing
          foreach ($f in @(
            @{ p = "$env:USERPROFILE\Desktop\Sample Paper.pdf";   o = 'win-icon-pdf.png' },
            @{ p = "$env:USERPROFILE\Desktop\Sample Session.ptl"; o = 'win-icon-ptl.png' },
            @{ p = "$env:USERPROFILE\Desktop\$($setup.Name)";     o = 'win-icon-installer.png' },
            @{ p = "$env:LOCALAPPDATA\Programs\Paper Trail\Paper Trail.exe"; o = 'win-icon-app.png' })) {
            $h = [JumboIcon]::Get($f.p)
            $bmp = [System.Drawing.Icon]::FromHandle($h).ToBitmap()
            # white backdrop: review sheets sit on light backgrounds
            $out = New-Object System.Drawing.Bitmap 256, 256
            $g = [System.Drawing.Graphics]::FromImage($out)
            $g.Clear([System.Drawing.Color]::White)
            $g.DrawImage($bmp, 0, 0, 256, 256)
            $out.Save($f.o)
          }
          Get-ChildItem win-icon-*.png

      - name: Explorer screenshot of the Desktop files (extra large icons)
        shell: pwsh
        run: |
          Copy-Item sample/WStarCats.pdf "$env:USERPROFILE\Desktop\Sample Paper.pdf"
          Copy-Item sample/WStarCats.ptl "$env:USERPROFILE\Desktop\Sample Session.ptl"
          Start-Process explorer.exe "$env:USERPROFILE\Desktop"
          Start-Sleep -Seconds 12
          Add-Type -AssemblyName System.Windows.Forms,System.Drawing
          # extra large icons so the 256px document icons are reviewable
          [System.Windows.Forms.SendKeys]::SendWait('^+1')
          Start-Sleep -Seconds 4
          $b = [System.Windows.Forms.Screen]::PrimaryScreen.Bounds
          $bmp = New-Object System.Drawing.Bitmap $b.Width, $b.Height
          $g = [System.Drawing.Graphics]::FromImage($bmp)
          $g.CopyFromScreen($b.Location, [System.Drawing.Point]::Empty, $b.Size)
          $bmp.Save("win-explorer.png")
          Get-ChildItem win-*.png

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: win-file-icons
          path: win-*.png
