# Builds the macOS (signed + notarized) and Windows desktop apps and
# attaches them to a GitHub Release ("Downloads"). Triggered by version
# tags (v1.2.3) or manually.
#
# Test locally with act (runs the job natively on your Mac):
#   act workflow_dispatch -W .github/workflows/release.yml -P macos-latest=-self-hosted
# The release-upload step is skipped under act (env.ACT is set).

name: Release desktop apps

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v5
      - name: Tag must match package.json version and have a changelog entry
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG=$(node -p "require('./package.json').version")
          echo "tag=$TAG pkg=$PKG"
          test "$TAG" = "$PKG"
          grep -q "^## $TAG$" CHANGELOG.md \
            || { echo "::error::CHANGELOG.md has no '## $TAG' section — write the user-facing summary first"; exit 1; }

  windows:
    needs: [check-version]
    if: ${{ !failure() && !cancelled() }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build

      - name: Generate the test-fixture PDF
        run: node build-node/test/fixture.js
      - name: Run unit tests
        run: node --test build-node/test/unit.js
      - name: Run e2e suite against the built app
        shell: bash
        run: |
          node build-node/node/server.js 8377 &
          for i in $(seq 1 60); do
            curl -s -o /dev/null http://127.0.0.1:8377/ && break
            sleep 0.5
          done
          node build-node/test/e2e.js

      - name: Package (unsigned)
        run: npx electron-builder --win --publish never
      - name: Smoke-test the packaged app
        shell: bash
        run: |
          "./dist-electron/win-unpacked/Paper Trail.exe" --smoke
      - name: Extract the changelog section for the release notes
        if: ${{ !env.ACT && startsWith(github.ref, 'refs/tags/') }}
        shell: bash
        run: |
          V="${GITHUB_REF#refs/tags/v}"
          awk -v v="$V" '$0 == "## "v {f=1; next} /^## / {f=0} f' CHANGELOG.md > RELEASE_NOTES.md
          test -s RELEASE_NOTES.md
      - name: Upload to GitHub Release
        if: ${{ !env.ACT && startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v3
        with:
          body_path: RELEASE_NOTES.md
          files: |
            dist-electron/*.exe
            dist-electron/*-win.zip
          generate_release_notes: true

  mac:
    needs: [check-version]
    if: ${{ !failure() && !cancelled() }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - run: npm ci

      - run: npm run build

      - name: Generate the test-fixture PDF
        run: node build-node/test/fixture.js

      - name: Run unit tests
        run: node --test build-node/test/unit.js

      - name: Run e2e suite against the built app
        shell: bash
        run: |
          node build-node/node/server.js 8377 &
          for i in $(seq 1 60); do
            curl -s -o /dev/null http://127.0.0.1:8377/ && break
            sleep 0.5
          done
          node build-node/test/e2e.js

      # Signing/notarization secrets — ALL REQUIRED; the job fails rather
      # than ship an unsigned build:
      #   MAC_CERT_P12        base64 of the Developer ID Application .p12
      #   MAC_CERT_PASSWORD   password of that .p12
      #   APPLE_API_KEY_P8    App Store Connect API key (.p8 contents)
      #   APPLE_API_KEY_ID    its Key ID
      #   APPLE_API_ISSUER    its Issuer ID
      # (Under act, pass them with --secret-file.)
      - name: Require signing secrets and set up notarization key
        env:
          CERT: ${{ secrets.MAC_CERT_P12 }}
          CERT_PW: ${{ secrets.MAC_CERT_PASSWORD }}
          P8: ${{ secrets.APPLE_API_KEY_P8 }}
          KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          missing=""
          [ -z "$CERT" ] && missing="$missing MAC_CERT_P12"
          [ -z "$CERT_PW" ] && missing="$missing MAC_CERT_PASSWORD"
          [ -z "$P8" ] && missing="$missing APPLE_API_KEY_P8"
          [ -z "$KEY_ID" ] && missing="$missing APPLE_API_KEY_ID"
          [ -z "$ISSUER" ] && missing="$missing APPLE_API_ISSUER"
          if [ -n "$missing" ]; then
            echo "::error::missing signing secrets:$missing — refusing to build an unsigned release"
            exit 1
          fi
          KEY_DIR="$RUNNER_TEMP/apple-keys"
          mkdir -p "$KEY_DIR"
          printf '%s' "$P8" > "$KEY_DIR/AuthKey.p8"
          echo "APPLE_API_KEY=$KEY_DIR/AuthKey.p8" >> "$GITHUB_ENV"
          echo "APPLE_API_KEY_ID=$KEY_ID" >> "$GITHUB_ENV"
          echo "APPLE_API_ISSUER=$ISSUER" >> "$GITHUB_ENV"

      - name: Package (signed + notarized)
        env:
          CSC_LINK: ${{ secrets.MAC_CERT_P12 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
        run: npx electron-builder --mac --publish never

      - name: Verify signature and notarization
        run: |
          APP=$(find dist-electron -maxdepth 3 -name "Paper Trail.app" | head -1)
          codesign --verify --deep --strict "$APP"
          # Authority lines only appear at verbose level 2 (-dvv)
          codesign -dvv "$APP" 2>&1 | grep "Authority=Developer ID Application"
          spctl -a -t exec -vv "$APP"

      - name: Smoke-test the packaged app
        run: |
          APP=$(find dist-electron -maxdepth 3 -name "Paper Trail.app" | head -1)
          echo "smoke-testing: $APP"
          "$APP/Contents/MacOS/Paper Trail" --smoke

      - name: List artifacts
        run: ls -la dist-electron/*.dmg dist-electron/*.zip

      - name: Extract the changelog section for the release notes
        if: ${{ !env.ACT && startsWith(github.ref, 'refs/tags/') }}
        shell: bash
        run: |
          V="${GITHUB_REF#refs/tags/v}"
          awk -v v="$V" '$0 == "## "v {f=1; next} /^## / {f=0} f' CHANGELOG.md > RELEASE_NOTES.md
          test -s RELEASE_NOTES.md
      - name: Upload to GitHub Release
        if: ${{ !env.ACT && startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v3
        with:
          body_path: RELEASE_NOTES.md
          files: |
            dist-electron/*.dmg
            dist-electron/*.zip
          generate_release_notes: true
