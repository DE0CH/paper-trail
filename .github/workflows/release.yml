# Builds the macOS desktop app and attaches it to a GitHub Release
# ("Downloads"). Triggered by version tags (v1.2.3) or manually.
#
# Test locally with act (runs the job natively on your Mac):
#   act workflow_dispatch -W .github/workflows/release.yml -P macos-latest=-self-hosted
# The release-upload step is skipped under act (env.ACT is set).

name: Release macOS app

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - name: Tag must match package.json version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG=$(node -p "require('./package.json').version")
          echo "tag=$TAG pkg=$PKG"
          test "$TAG" = "$PKG"

  windows:
    needs: [check-version]
    if: ${{ !failure() && !cancelled() }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build

      - name: Generate the test-fixture PDF
        run: node build-node/test/fixture.js
      - name: Run e2e suite against the built app
        shell: bash
        run: |
          node build-node/node/server.js 8377 &
          for i in $(seq 1 60); do
            curl -s -o /dev/null http://127.0.0.1:8377/ && break
            sleep 0.5
          done
          node build-node/test/e2e.js

      - name: Package (unsigned)
        run: npx electron-builder --win --publish never
      - name: Smoke-test the packaged app
        shell: bash
        run: |
          "./dist-electron/win-unpacked/Paper Trail.exe" --smoke
      - name: Upload to GitHub Release
        if: ${{ !env.ACT && startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-electron/*.exe
            dist-electron/*-win.zip
          generate_release_notes: true

  mac:
    needs: [check-version]
    if: ${{ !failure() && !cancelled() }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - run: npm run build

      - name: Generate the test-fixture PDF
        run: node build-node/test/fixture.js

      - name: Run e2e suite against the built app
        shell: bash
        run: |
          node build-node/node/server.js 8377 &
          for i in $(seq 1 60); do
            curl -s -o /dev/null http://127.0.0.1:8377/ && break
            sleep 0.5
          done
          node build-node/test/e2e.js

      - name: Package (unsigned)
        run: npx electron-builder --mac --publish never

      - name: Smoke-test the packaged app
        run: |
          APP=$(find dist-electron -maxdepth 3 -name "Paper Trail.app" | head -1)
          echo "smoke-testing: $APP"
          "$APP/Contents/MacOS/Paper Trail" --smoke

      - name: List artifacts
        run: ls -la dist-electron/*.dmg dist-electron/*.zip

      - name: Upload to GitHub Release
        if: ${{ !env.ACT && startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-electron/*.dmg
            dist-electron/*.zip
          generate_release_notes: true
