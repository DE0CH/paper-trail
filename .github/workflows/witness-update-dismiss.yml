# Focused single-test witness for the update-window Cancel=DISMISS change:
# builds and runs ONLY updateWindowCancel on a mac runner (has a display).
# Watch the contract RED (old real-cancel product code, new test) and
# GREEN (new dismiss code, new test) at once. Branch-scoped push +
# dispatch — a brand-new workflow can't be dispatched by name off the
# default branch, so the witness refs trigger it by push.
name: Witness update dismiss

on:
  workflow_dispatch: {}
  push:
    branches: [witness-update-dismiss-red, witness-update-dismiss-green]

jobs:
  witness:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build
      - name: Cancel dismisses the update window; the download keeps going
        run: npx electron build-node/test/updateWindowCancel.js
