# TEMP focused validation for the smooth-scroll branch (deleted before
# merge): the new progressive-scroll e2e test, the viewer-adjacent
# immutable suites it must not regress, the unit suites, and the
# scroll-smoothness profile run twice — on this branch and with
# src/core/viewer.ts reverted to origin/main — for before/after numbers.
# The full pyramid runs on the merge gate.

name: Focus smooth scroll (temp)

on:
  push:
    branches: ['smooth-scroll']

permissions:
  contents: read

jobs:
  focus:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build
      - name: Generate fixtures + large profiling PDF
        run: |
          node build-node/tools/fixture.js
          node build-node/tools/perfBigPdf.js 600
      - name: Unit suites
        run: |
          node --test build-node/test/unit.js
          node --test build-node/test/unitEdges.js
          node --test build-node/test/renderGeometryUnit.js
      - name: Start the web server
        shell: bash
        run: |
          node build-node/node/server.js 8377 &
          for i in $(seq 1 60); do
            curl -s -o /dev/null http://127.0.0.1:8377/ && break
            sleep 0.5
          done
          node build-node/tools/geometry.js
      - name: Scrolling and zoom-out paint entering pages low-res first, then crisp
        if: ${{ !cancelled() }}
        run: node build-node/test/smoothScroll.js
      - name: Browser e2e suite
        if: ${{ !cancelled() }}
        run: node build-node/test/e2e.js
      - name: A devicePixelRatio change re-renders the visible pages
        if: ${{ !cancelled() }}
        run: node build-node/test/dprChangeRerender.js
      - name: A large scale jump leaves no ghost page
        if: ${{ !cancelled() }}
        run: node build-node/test/ghostPageAfterFit.js
      - name: A no-anchor zoom stays horizontally centered
        if: ${{ !cancelled() }}
        run: node build-node/test/offCenterZoom.js
      - name: A huge page at high zoom renders within the canvas caps
        if: ${{ !cancelled() }}
        run: node build-node/test/hugePageZoomBlank.js
      - name: A persistently failing page render does not retry-storm
        if: ${{ !cancelled() }}
        run: node build-node/test/renderRetryStorm.js
      - name: Pinch-gesture state does not survive a document swap
        if: ${{ !cancelled() }}
        run: node build-node/test/pinchDocSwap.js
      - name: Rapid-action race conditions stay consistent
        if: ${{ !cancelled() }}
        run: node build-node/test/raceConditions.js
      - name: Scroll profile — AFTER (this branch)
        if: ${{ !cancelled() }}
        run: node build-node/tools/perfScroll.js
      - name: Rebuild with origin/main's viewer for the baseline numbers
        if: ${{ !cancelled() }}
        run: |
          git checkout origin/main -- src/core/viewer.ts
          npm run build
      - name: Scroll profile — BEFORE (origin/main viewer)
        if: ${{ !cancelled() }}
        run: node build-node/tools/perfScroll.js
