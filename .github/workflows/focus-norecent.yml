# TEMPORARY focus workflow for fast red/green iteration on the TCC
# Open-Recent fix. Runs only the new desktop regression test on a
# GitHub-hosted macOS runner. DELETE before the branch is finished.
name: focus-norecent

on:
  workflow_dispatch: {}
  # A push-triggered workflow runs from the pushed branch itself (unlike
  # workflow_dispatch, which GitHub only registers from the default
  # branch), so this fires on every push to the fix branch for fast
  # red/green iteration. TEMPORARY — deleted before the branch is done.
  push:
    branches: [fix-tcc-documents-prompt]

jobs:
  norecent:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - run: npm ci

      - run: npm run build

      - name: Generate the test-fixture PDFs
        run: node build-node/tools/fixture.js

      - name: Saving a session never registers it with the OS Open-Recent (TCC prompt)
        run: npx electron build-node/test/desktopNoRecentDoc.js
