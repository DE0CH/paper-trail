# TEMP focused validation for the format-v2 branch (deleted before merge):
# the format/unit suites only — the full pyramid runs on the merge gate.

name: Focus format v2 (temp)

on:
  push:
    branches: ['format-v2']

permissions:
  contents: read

jobs:
  units:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build
      - run: node --test build-node/test/progressV2Unit.js
      - run: node --test build-node/test/unit.js
      - run: node --test build-node/test/unitEdges.js
      - run: node --test build-node/test/progressBomUnit.js
