# TEMP focused runner for the controller open/replace/save fixes on the
# fix-controller-open-save branch. Runs only the new regression tests
# (all browser/unit — no Electron), so Linux runners are fine and fast.
# Steps are gated on the test file existing, so partial (red) branches
# run exactly the tests they carry. Delete before merging.
name: Focus controller-open-save

on:
  workflow_dispatch: {}
  push:
    branches: ['fix-controller-open-save', 'tmp-cos-*']

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - run: npm ci

      - run: npm run build

      - run: node build-node/tools/fixture.js

      - name: Start the web server
        shell: bash
        run: |
          node build-node/node/server.js 8377 &
          for i in $(seq 1 60); do
            curl -s -o /dev/null http://127.0.0.1:8377/ && break
            sleep 0.5
          done
          node build-node/tools/geometry.js

      - name: BOM-prefixed session files parse (unit)
        if: ${{ !cancelled() && hashFiles('src/test/progressBomUnit.ts') != '' }}
        run: node --test build-node/test/progressBomUnit.js

      - name: Recents merge unit (interleaved windows lose nothing)
        if: ${{ !cancelled() && hashFiles('src/test/recentsMergeUnit.ts') != '' }}
        run: node --test build-node/test/recentsMergeUnit.js

      - name: A dropped PDF+session pair binds the session as the save target
        if: ${{ !cancelled() && hashFiles('src/test/dropPairSessionTarget.ts') != '' }}
        run: node build-node/test/dropPairSessionTarget.js

      - name: An edit during an in-flight save is never marked saved
        if: ${{ !cancelled() && hashFiles('src/test/writeGenerationDirty.ts') != '' }}
        run: node build-node/test/writeGenerationDirty.js

      - name: Replacing with a corrupt PDF leaves the session untouched
        if: ${{ !cancelled() && hashFiles('src/test/replaceCorruptPdf.ts') != '' }}
        run: node build-node/test/replaceCorruptPdf.js

      - name: A corrupt PDF pick keeps the waiting session
        if: ${{ !cancelled() && hashFiles('src/test/pendingSessionCorruptPdf.ts') != '' }}
        run: node build-node/test/pendingSessionCorruptPdf.js

      - name: Two windows' recent lists merge (no lost entries)
        if: ${{ !cancelled() && hashFiles('src/test/recentsTwoWindows.ts') != '' }}
        run: node build-node/test/recentsTwoWindows.js

      - name: An explicit save queues behind an in-flight auto-save
        if: ${{ !cancelled() && hashFiles('src/test/explicitSaveDuringAutosave.ts') != '' }}
        run: node build-node/test/explicitSaveDuringAutosave.js

      - name: Replace undo/redo keeps navigation done since the replace
        if: ${{ !cancelled() && hashFiles('src/test/replaceUndoRecapture.ts') != '' }}
        run: node build-node/test/replaceUndoRecapture.js
