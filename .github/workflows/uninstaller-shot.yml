# TEMP diagnostic — screenshot the Windows uninstaller so the branded
# icon can be verified visually. Deleted once the icon is confirmed.

name: Uninstaller screenshot (temp)

on:
  workflow_dispatch: {}
  push:
    branches: [uninstaller-icon]

permissions:
  contents: read

jobs:
  shot:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build
      - name: Package x64 NSIS installer (unsigned)
        shell: bash
        run: npx electron-builder --win nsis --x64 --publish never
      - name: Install silently
        shell: pwsh
        run: |
          $setup = Get-ChildItem dist-electron -Filter 'Paper-Trail-Setup-*.exe' | Select-Object -First 1
          Start-Process $setup.FullName -ArgumentList '/S' -Wait
          $un = Get-ChildItem "$env:LOCALAPPDATA\Programs" -Recurse -Filter 'Uninstall*.exe' | Select-Object -First 1
          if (-not $un) { throw 'uninstaller not found after silent install' }
          "UNINST=$($un.FullName)" | Out-File -Append $env:GITHUB_ENV
      - name: Extract the icon embedded in the uninstaller exe
        shell: pwsh
        run: |
          python -m pip install --quiet pefile pillow
          python src/tools/extract_exe_icon.py "$env:UNINST" shots
      - name: Screenshot the uninstaller wizard
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force shots | Out-Null
          Start-Process $env:UNINST
          Start-Sleep -Seconds 12
          Add-Type -AssemblyName System.Windows.Forms,System.Drawing
          $b = [System.Windows.Forms.Screen]::PrimaryScreen.Bounds
          $bmp = New-Object System.Drawing.Bitmap $b.Width, $b.Height
          $g = [System.Drawing.Graphics]::FromImage($bmp)
          $g.CopyFromScreen(0, 0, 0, 0, $bmp.Size)
          $bmp.Save('shots/uninstaller-wizard.png')
          Get-Process | Where-Object { $_.Path -eq $env:UNINST } | Stop-Process -Force -ErrorAction SilentlyContinue
      - uses: actions/upload-artifact@v4
        with:
          name: uninstaller-shots
          path: shots/
          if-no-files-found: error
