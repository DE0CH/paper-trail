# Focused validation for the updater-simplification branch: after the
# win32 flash-close guard and the mac Software Update window were removed,
# this proves the branch still compiles, bundles, and packages into a real
# app after the surgery (main.ts, vite entry, deleted window files).
#
# Mirror-only (de0ch-org), on Depot: the private mirror's GitHub-hosted
# minutes are unavailable, and Depot can't run the Windows GUI silent-
# update suite (no interactive desktop) — so the Windows silent-update
# RUNTIME tests must be validated on the public de0ch origin instead. This
# job is the strongest signal the mirror can give: a full build + package.
name: Validate silent update (focused)

on:
  push: {}
  workflow_dispatch: {}

jobs:
  mac-build:
    if: ${{ github.repository_owner == 'de0ch-org' }}
    runs-on: depot-macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - run: npm ci

      - name: Build (tsc renderer + vite bundle + tsc node/desktop)
        run: npm run build

      - name: Generate the test-fixture PDFs
        run: node build-node/tools/fixture.js

      - name: Package the macOS app (unsigned)
        run: npx electron-builder --mac zip --publish never -c.mac.notarize=false -c.mac.timestamp=none
