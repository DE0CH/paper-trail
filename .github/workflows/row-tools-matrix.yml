# TEMPORARY — screenshot matrix for the row-tools redesign review.
# Runs on pushes to the feature branch only; delete before merging.
name: row-tools-screenshot-matrix

on:
  push:
    branches: [row-tools-one-container]

jobs:
  matrix:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - run: npm ci

      - run: npm run build

      - name: Generate the test-fixture PDFs
        run: node build-node/tools/fixture.js

      - name: Start the web server
        shell: bash
        run: |
          node build-node/node/server.js 8377 &
          for i in $(seq 1 60); do
            curl -s -o /dev/null http://127.0.0.1:8377/ && break
            sleep 0.5
          done

      - name: Capture and verify the screenshot matrix
        run: node build-node/test/screenshotMatrix.js

      - name: Upload the matrix as one artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: row-tools-matrix
          path: matrix-shots/
          if-no-files-found: error
