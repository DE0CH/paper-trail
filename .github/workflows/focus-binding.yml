# Focused single-test workflow for the session-binding fix: builds and runs
# ONLY the open-method binding e2e, so red/green iteration is fast. Fires on
# a push to a bind-** branch (no workflow_dispatch, which wouldn't be visible
# until the file reached the default branch). Dev-iteration tool — drop it
# once the fix merges.
name: focus binding e2e
on:
  push:
    branches: ['bind-**']
jobs:
  binding:
    runs-on: ${{ github.repository_owner == 'de0ch-org' && 'depot-ubuntu-24.04' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build
      - name: Generate the test-fixture PDFs
        run: node build-node/tools/fixture.js
      - name: Start the web server
        shell: bash
        run: |
          node build-node/node/server.js 8377 &
          for i in $(seq 1 60); do
            curl -s -o /dev/null http://127.0.0.1:8377/ && break
            sleep 0.5
          done
      - name: Every open method binds the same silent-write target
        run: node build-node/test/dropBindsSilentTarget.js
