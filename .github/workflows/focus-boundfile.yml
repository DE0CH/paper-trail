# TEMPORARY focus workflow for the bound-file unit tests (fast red/green
# TDD loop). Deleted before the branch is handed over; ci.yml carries the
# real wiring.

name: Focus bound-file unit tests

on:
  push:
    branches: [refactor-boundfile]
  workflow_dispatch: {}

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm ci
      - run: npx tsc -p tsconfig.node.json
      - name: Bound-file unit tests (handle/path file identity)
        run: node --test build-node/test/boundFileUnit.js
