# On-demand DEV build of the desktop apps — does NOT run or require CI.
# For examining a build during development while the full release CI is
# red/flaky. macOS is SIGNED + NOTARIZED (installs cleanly, no Gatekeeper
# warning); Windows is unsigned (SmartScreen "More info > Run anyway").
#
# Uploads the five files the release publishes as run artifacts (NOTE:
# GitHub always wraps artifact downloads in a zip container; bare-file
# downloads would need release assets — pending an owner decision).
#
# Uses the shared release config (package.json > build) unchanged, so the
# outputs match the published release exactly.
#
# Run it:  Actions > "Dev build (no CI)" > Run workflow  (pick a branch),
# or:      gh workflow run dev-build.yml --ref <branch> [-f ref=<sha>]

name: Dev build (no CI)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "branch/tag/SHA to build (blank = the ref you dispatch on)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  mac:
    # Owner-keyed like ci.yml: on the private mirror (de0ch-org) the mac
    # leg runs on Depot — GitHub's mac pool is the throttled scarce
    # resource. Signing secrets exist only on origin, so mirror builds
    # are UNSIGNED (dev-loop tradeoff, chosen by the owner).
    runs-on: ${{ github.repository_owner == 'de0ch-org' && 'depot-macos-latest' || 'macos-latest' }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build
      - name: Set up mac signing + notarization key (App Store Connect API)
        env:
          CERT: ${{ secrets.MAC_CERT_P12 }}
          CERT_PW: ${{ secrets.MAC_CERT_PASSWORD }}
          P8: ${{ secrets.APPLE_API_KEY_P8 }}
          KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          missing=""
          [ -z "$CERT" ] && missing="$missing MAC_CERT_P12"
          [ -z "$CERT_PW" ] && missing="$missing MAC_CERT_PASSWORD"
          [ -z "$P8" ] && missing="$missing APPLE_API_KEY_P8"
          [ -z "$KEY_ID" ] && missing="$missing APPLE_API_KEY_ID"
          [ -z "$ISSUER" ] && missing="$missing APPLE_API_ISSUER"
          if [ -n "$missing" ]; then
            if [ "${{ github.repository_owner }}" = "de0ch" ]; then
              echo "::error::missing mac signing secrets on origin:$missing"; exit 1
            fi
            echo "::warning::no signing secrets here (mirror) — building UNSIGNED"
            echo "PT_UNSIGNED=1" >> "$GITHUB_ENV"
            exit 0
          fi
          KEY_DIR="$RUNNER_TEMP/apple-keys"; mkdir -p "$KEY_DIR"
          printf '%s' "$P8" > "$KEY_DIR/AuthKey.p8"
          echo "APPLE_API_KEY=$KEY_DIR/AuthKey.p8" >> "$GITHUB_ENV"
          echo "APPLE_API_KEY_ID=$KEY_ID" >> "$GITHUB_ENV"
          echo "APPLE_API_ISSUER=$ISSUER" >> "$GITHUB_ENV"
      - name: Package mac universal (signed+notarized when secrets exist)
        env:
          CSC_LINK: ${{ secrets.MAC_CERT_P12 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
        run: |
          if [ -n "$PT_UNSIGNED" ]; then
            CSC_IDENTITY_AUTO_DISCOVERY=false npx electron-builder --mac zip dmg \
              --publish never --config.mac.notarize=false
          else
            npx electron-builder --mac zip dmg --publish never
          fi
      # Already-compressed payloads (zip / ULFO dmg): no recompression.
      - name: Upload macOS app (.zip)
        uses: actions/upload-artifact@v4
        with:
          name: pt-mac-zip
          path: dist-electron/Paper-Trail-*-mac.zip
          if-no-files-found: error
          compression-level: 0
      - name: Upload macOS installer (.dmg)
        uses: actions/upload-artifact@v4
        with:
          name: pt-mac-dmg
          path: dist-electron/Paper-Trail-*.dmg
          if-no-files-found: error
          compression-level: 0

  windows:
    # Windows never runs on Depot (no interactive session) and the mirror
    # cannot provision GitHub-hosted Windows — so this job exists only on
    # origin; a mirror dispatch builds mac-only.
    if: ${{ github.repository_owner == 'de0ch' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build
      # One pass builds both arches from the config; NSIS yields ONE combined
      # installer (the shared release nsis.artifactName has no ${arch}), exactly
      # as the release does. The zips already carry ${arch} via win.artifactName.
      - name: Package windows — both arches, one installer (unsigned)
        shell: bash
        env:
          ELECTRON_BUILDER_7Z_FILTER: BCJ2
        run: npx electron-builder --win --publish never
      - name: List built windows artifacts
        shell: bash
        run: ls -la dist-electron/
      # Already-compressed payloads: no recompression (see the mac note).
      - name: Upload Windows x64 app
        uses: actions/upload-artifact@v4
        with:
          name: pt-win-x64-app
          path: dist-electron/Paper-Trail-*-x64-win.zip
          if-no-files-found: error
          compression-level: 0
      - name: Upload Windows arm64 app
        uses: actions/upload-artifact@v4
        with:
          name: pt-win-arm64-app
          path: dist-electron/Paper-Trail-*-arm64-win.zip
          if-no-files-found: error
          compression-level: 0
      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: pt-win-installer
          path: dist-electron/Paper-Trail-Setup-*.exe
          if-no-files-found: error
          compression-level: 0
