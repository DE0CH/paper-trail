# On-demand DEV build of the desktop apps — does NOT run or require CI.
# For examining a build during development while the full release CI is
# red/flaky. Unsigned (mac: right-click > Open, or `xattr -cr` the .app;
# Windows: SmartScreen "More info > Run anyway"). Artifacts are attached
# to the run, NOT published as a release and NOT deployed.
#
# Uploads the FIVE artifacts the release publishes, each on its own so it
# can be grabbed separately:
#   pt-mac-dmg        - macOS universal installer (.dmg)
#   pt-mac-zip        - macOS universal app (.zip)
#   pt-win-x64-app    - Windows x64 portable app (.zip)
#   pt-win-arm64-app  - Windows arm64 portable app (.zip)
#   pt-win-installer  - Windows NSIS installer (.exe — one, both arches)
#
# Uses the shared release config (package.json > build) unchanged, so the
# outputs match the published release exactly.
#
# Run it:  Actions > "Dev build (no CI)" > Run workflow  (pick a branch),
# or:      gh workflow run dev-build.yml --ref <branch> [-f ref=<sha>]

name: Dev build (no CI)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "branch/tag/SHA to build (blank = the ref you dispatch on)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build
      - name: Package mac universal — zip + dmg (unsigned, no notarization)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --mac zip dmg --publish never -c.mac.notarize=false -c.mac.identity=null -c.mac.hardenedRuntime=false
      - name: List built mac artifacts
        run: ls -la dist-electron/
      - name: Upload macOS app (.zip)
        uses: actions/upload-artifact@v4
        with:
          name: pt-mac-zip
          path: dist-electron/Paper-Trail-*-mac.zip
          if-no-files-found: error
      - name: Upload macOS installer (.dmg)
        uses: actions/upload-artifact@v4
        with:
          name: pt-mac-dmg
          path: dist-electron/Paper-Trail-*.dmg
          if-no-files-found: error

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build
      # One pass builds both arches from the config; NSIS yields ONE combined
      # installer (the shared release nsis.artifactName has no ${arch}), exactly
      # as the release does. The zips already carry ${arch} via win.artifactName.
      - name: Package windows — both arches, one installer (unsigned)
        shell: bash
        env:
          ELECTRON_BUILDER_7Z_FILTER: BCJ2
        run: npx electron-builder --win --publish never
      - name: List built windows artifacts
        shell: bash
        run: ls -la dist-electron/
      - name: Upload Windows x64 app
        uses: actions/upload-artifact@v4
        with:
          name: pt-win-x64-app
          path: dist-electron/Paper-Trail-*-x64-win.zip
          if-no-files-found: error
      - name: Upload Windows arm64 app
        uses: actions/upload-artifact@v4
        with:
          name: pt-win-arm64-app
          path: dist-electron/Paper-Trail-*-arm64-win.zip
          if-no-files-found: error
      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: pt-win-installer
          path: dist-electron/Paper-Trail-Setup-*.exe
          if-no-files-found: error
