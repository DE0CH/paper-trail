# Dev-iteration validation for the fix-drop-** branch: runs the REAL
# drag-drop desktop-e2e (real .ptl on disk, real webUtils.getPathForFile).
# MIRROR-GATED — the `if` skips it on GitHub-hosted (de0ch); it only ever
# runs on the Depot mirror (de0ch-org), so a stray origin push can't pull
# CI onto GitHub's runners. Delete at merge.
name: Focus drop-bind

on:
  push:
    branches: ['fix-drop-**']

permissions:
  contents: read

jobs:
  drop:
    if: ${{ github.repository_owner == 'de0ch-org' }}
    runs-on: depot-macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build
      - run: node build-node/tools/fixture.js
      - name: Real drag-drop binds the on-disk path (no getPathForFile stub)
        run: node build-node/test/desktopDropBinds.js
