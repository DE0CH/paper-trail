# TEMPORARY workflow: photograph the REAL dmg window on macOS 15.
# Builds an x64-only dmg from the committed background (fast — this
# diagnostic needs the Finder window, not the universal binary),
# mounts it, lets Finder open the volume with the dmg's .DS_Store
# layout, and screenshots the actual window with the system's own
# Applications icon. Runs on GitHub-hosted macos-15-intel (Depot's
# screencapture is blocked), so the job is skipped on the mirror.
# Delete this file before the branch is handed back.

name: DMG window screenshot (temp)

on:
  push:
    branches: ['dmg-design']
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  shot:
    if: github.repository_owner != 'de0ch-org'
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build
      - name: Package an unsigned x64 dmg from the committed background
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --mac dmg --x64 --publish never -c.mac.notarize=false
      - name: Mount the dmg and let Finder show its window
        run: |
          DMG=$(ls dist-electron/*.dmg)
          MOUNT=$(hdiutil attach "$DMG" | grep -o '/Volumes/.*' | tail -1)
          echo "mounted at: $MOUNT"
          echo "MOUNT=$MOUNT" >> "$GITHUB_ENV"
          open "$MOUNT"
          sleep 12
      - name: Screenshot the screen and (best effort) the Finder window
        run: |
          screencapture -x shot-fullscreen.png
          python3 -m pip install --quiet pillow pyobjc-framework-Quartz || true
          python3 - <<'EOF' || true
          # Find the Finder window's CGWindow bounds; crop the full-screen
          # shot to it and also try a window-scoped capture by window id.
          import subprocess
          try:
              import Quartz
              wins = Quartz.CGWindowListCopyWindowInfo(
                  Quartz.kCGWindowListOptionOnScreenOnly, Quartz.kCGNullWindowID)
              finder = [dict(w) for w in wins
                        if w.get('kCGWindowOwnerName') == 'Finder'
                        and w.get('kCGWindowBounds', {}).get('Height', 0) > 100]
              for w in finder:
                  print('Finder window:', w.get('kCGWindowNumber'),
                        w.get('kCGWindowName'), w.get('kCGWindowBounds'))
              if finder:
                  w = finder[0]
                  subprocess.run(['screencapture', '-x',
                                  '-l', str(w['kCGWindowNumber']),
                                  'shot-window.png'], check=False)
                  from PIL import Image
                  b = w['kCGWindowBounds']
                  img = Image.open('shot-fullscreen.png')
                  scale = img.width / Quartz.CGDisplayBounds(
                      Quartz.CGMainDisplayID()).size.width
                  box = tuple(int(v * scale) for v in (
                      b['X'], b['Y'], b['X'] + b['Width'], b['Y'] + b['Height']))
                  img.crop(box).save('shot-window-crop.png')
          except Exception as e:
              print('window-scoped capture unavailable:', e)
          EOF
          # honesty check: flag an all-black capture (screen-recording
          # consent gate) instead of presenting it as evidence
          python3 - <<'EOF'
          from PIL import Image
          img = Image.open('shot-fullscreen.png').convert('L')
          lo, hi = img.getextrema()
          print('fullscreen luminance extrema:', lo, hi)
          if hi < 16:
              print('::warning::screencapture returned a black image (consent gate?)')
          EOF
      - name: Also refresh the composited preview (new mock folder)
        run: PT_DMG_RENDERS="$PWD/renders" node build-node/tools/dmgBackground.js
      - name: Upload the shots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dmg-window-shots
          path: |
            shot-*.png
            renders/dmg-preview.png
