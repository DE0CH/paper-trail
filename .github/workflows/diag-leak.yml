# TEMP diagnostic — is the per-page memory growth a leak? (delete after use)
# Runs the memLeakProbe scenarios on windows-latest (the platform the
# earlier footprint numbers came from).

name: Diag mem leak (temp)

on:
  push:
    branches: ['diag-leak']
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  probe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build
      - run: node build-node/tools/fixture.js
      - name: Run the leak probe
        shell: bash
        run: npx electron build-node/tools/memLeakProbe.js
