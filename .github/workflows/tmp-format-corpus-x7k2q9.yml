# TEMPORARY focused validation for the format-corpus branch: the new
# back-compat corpus suites plus their format-suite siblings, on both CI
# platform families. Deleted from the branch tip once green.

name: tmp-format-corpus

on:
  push:
    branches: [format-corpus]

jobs:
  focused:
    strategy:
      fail-fast: false
      matrix:
        runner: [windows-latest, macos-latest]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - run: npm ci

      - run: npm run build

      - name: Generate the test-fixture PDFs
        run: node build-node/tools/fixture.js

      - name: Corpus fixture bytes survived checkout (BOM + CRLF)
        shell: bash
        run: |
          xxd src/test/fixtures/ptl/v1-bom.ptl | head -1
          xxd src/test/fixtures/ptl/v1-crlf.ptl | head -2

      - name: Unit tests
        run: node --test build-node/test/unit.js

      - name: BOM-prefixed session files parse
        if: ${{ !cancelled() }}
        run: node --test build-node/test/progressBomUnit.js

      - name: Session format v2 (no timestamp; v1 time frozen verbatim)
        if: ${{ !cancelled() }}
        run: node --test build-node/test/progressV2Unit.js

      - name: Back-compat corpus — every shipped session-file variant still opens
        if: ${{ !cancelled() }}
        run: node --test build-node/test/formatCorpusUnit.js

      - name: Start the web server for the browser suite
        if: ${{ !cancelled() }}
        shell: bash
        run: |
          node build-node/node/server.js 8377 &
          for i in $(seq 1 60); do
            curl -s -o /dev/null http://127.0.0.1:8377/ && break
            sleep 0.5
          done
          node build-node/tools/geometry.js

      - name: The oldest shipped session file restores through the real UI
        if: ${{ !cancelled() }}
        shell: bash
        run: node build-node/test/formatCorpusE2e.js
