# TEMPORARY focused dev workflow for the installer shortcut-choices
# feature: only the Windows jobs the change can affect — the new
# shortcut-choices test plus the immutable installer and update suites —
# on windows-latest (GitHub-hosted). The mac legs and browser suites are
# untouched by build/installer.nsh; main's push CI covers everything
# after the merge. DELETE THIS FILE before the branch is merged.
name: Installer shortcut choices (focused, temporary)

on:
  push:
    branches: [installer-shortcut-choices]
  workflow_dispatch: {}

jobs:
  installers:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - run: npm ci

      - run: npm run build

      - name: Generate the test-fixture PDFs
        run: node build-node/tools/fixture.js

      - name: Package the Windows app (unsigned)
        env:
          ELECTRON_BUILDER_7Z_FILTER: BCJ2
        run: npx electron-builder --win --publish never

      - name: Installer declares DPI awareness (no HiDPI pixelation)
        shell: bash
        run: node build-node/test/installerDpiAware.js

      - name: Installer test (install, shortcuts, smoke, uninstall)
        shell: bash
        run: node build-node/test/installerWin.js

      - name: Installer never force-closes a running app (unsaved work wins)
        shell: bash
        run: node build-node/test/installerCloseUnsaved.js

      - name: Installed-apps list shows the app icon (DisplayIcon)
        shell: bash
        run: node build-node/test/installerDisplayIcon.js

      - name: Installer shortcut choices (silent defaults, assisted untick)
        shell: bash
        run: node build-node/test/installerShortcutChoices.js

  updates:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - run: npm ci

      - run: npm run build

      - name: Generate the test-fixture PDFs
        run: node build-node/tools/fixture.js

      - name: Package the current version (installer only)
        env:
          ELECTRON_BUILDER_7Z_FILTER: BCJ2
        run: npx electron-builder --win nsis --publish never

      - name: Build the next version into the update feed
        env:
          ELECTRON_BUILDER_7Z_FILTER: BCJ2
        shell: bash
        run: |
          npm version patch --no-git-tag-version
          npx electron-builder --win nsis --publish never -c.directories.output=dist-update-feed
          git checkout -- package.json package-lock.json

      - name: Update-feed names match the packaged artifacts
        shell: bash
        run: node build-node/test/updateFeedNames.js dist-electron dist-update-feed

      - name: Auto-update test (real install-update-install cycle)
        shell: bash
        run: node build-node/test/updateWin.js

      - name: Install-on-quit test (background download, normal quit)
        shell: bash
        run: node build-node/test/updateWinQuitInstall.js

      - name: Double-click a PDF against a quit-installed update
        if: ${{ !cancelled() }}
        shell: bash
        run: node build-node/test/updateWinOpenAfterUpdate.js

      - name: Resilience — hard kill during the install
        if: ${{ !cancelled() }}
        shell: bash
        run: node build-node/test/updateWinKillDuringInstall.js
