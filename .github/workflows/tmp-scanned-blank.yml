# TEMPORARY focused workflow for iterating on the scanned-blank
# regression (fast single-test feedback instead of the full pyramid).
# Deleted from the branch tip once the red/green validation is done.

name: tmp-scanned-blank

on:
  # Push-triggered on the working branches (a dispatch-only workflow that
  # never existed on the default branch cannot be dispatched at all).
  # Iteration runs on ubuntu; the mac confirmation runs come from
  # workflow_dispatch with runner=macos-latest once registered.
  push:
    branches: [scanned-blank, scanned-blank-red]
  workflow_dispatch:
    inputs:
      runner:
        description: runner to use
        type: choice
        default: ubuntu-latest
        options:
          - ubuntu-latest
          - macos-latest

jobs:
  scanned:
    runs-on: ${{ inputs.runner || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - run: npm ci

      - run: npm run build

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate the scanned-document fixture (full-page G4/JPEG scans)
        shell: bash
        run: |
          python -m pip install --quiet pillow
          python src/tools/gen_scanned_fixture.py

      - name: Start the web server and run the scanned-document suite
        shell: bash
        run: |
          node build-node/node/server.js 8377 &
          for i in $(seq 1 60); do
            curl -s -o /dev/null http://127.0.0.1:8377/ && break
            sleep 0.5
          done
          node build-node/test/scannedBlank.js

      - name: Desktop shell renders the scanned document (mac only)
        if: ${{ !cancelled() && inputs.runner == 'macos-latest' }}
        shell: bash
        run: node build-node/test/desktopScannedBlank.js
