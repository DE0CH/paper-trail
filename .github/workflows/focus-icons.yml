# Dev-iteration only: validates the zoom −/+ SVG-icon conversion on Depot
# (the alignment guard + the full browser e2e suite). Runs ONLY on the
# private mirror (Depot runners); a no-op on origin. Never fires on main.
# Delete at merge.
name: Focus icons
on:
  push:
    branches: ['icons-svg', 'icons-**']
jobs:
  icons:
    if: ${{ github.repository_owner == 'de0ch-org' }}
    runs-on: depot-ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build
      - name: Generate the test-fixture PDFs
        run: node build-node/tools/fixture.js
      - name: Start the web server
        run: |
          node build-node/node/server.js 8377 &
          for i in $(seq 1 60); do
            curl -s -o /dev/null http://127.0.0.1:8377/ && break
            sleep 0.5
          done
          node build-node/tools/geometry.js
      - name: Measured alignment guard (zoom control + row labels)
        run: node build-node/test/uiAlignment.js
      - name: Full browser e2e suite
        if: ${{ !cancelled() }}
        run: node build-node/test/e2e.js
