# Focused single-test witness for the search committed/uncommitted state:
# builds, serves the web app, and runs ONLY searchCommitState. Used to
# watch the regression RED (feature reverted) and GREEN (feature applied)
# at once. Branch-scoped push + dispatch — a brand-new workflow can't be
# dispatched by name off the default branch, so the witness refs trigger
# it by push.
name: Witness search commit

on:
  workflow_dispatch: {}
  push:
    branches: [witness-search-commit-red, witness-search-commit-green]

jobs:
  witness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build
      - name: Generate the test-fixture PDF
        run: node build-node/tools/fixture.js
      - name: Search entries commit on the right actions and only those
        shell: bash
        run: |
          node build-node/node/server.js 8377 &
          for i in $(seq 1 60); do
            curl -s -o /dev/null http://127.0.0.1:8377/ && break
            sleep 0.5
          done
          node build-node/test/searchCommitState.js
