# TEMPORARY focus workflow for the save-picker-on-close regression test.
# Deleted before the branch is handed over; ci.yml carries the real wiring.

name: Focus save-picker-on-close

on:
  workflow_dispatch: {}

jobs:
  mac:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build
      - name: Generate the test-fixture PDFs
        run: node build-node/tools/fixture.js
      - name: Save picker on close (window-close path)
        timeout-minutes: 8
        env:
          PT_SDC_MODE: close
        run: npx electron build-node/test/desktopSavePickerOnClose.js
      - name: Save picker on close (quit path)
        if: ${{ !cancelled() }}
        timeout-minutes: 8
        env:
          PT_SDC_MODE: quit
        run: npx electron build-node/test/desktopSavePickerOnClose.js

  windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build
      - name: Generate the test-fixture PDFs
        run: node build-node/tools/fixture.js
      - name: Save picker on close (window-close path)
        timeout-minutes: 8
        env:
          PT_SDC_MODE: close
        run: npx electron build-node/test/desktopSavePickerOnClose.js
      - name: Save picker on close (quit path)
        if: ${{ !cancelled() }}
        timeout-minutes: 8
        env:
          PT_SDC_MODE: quit
        run: npx electron build-node/test/desktopSavePickerOnClose.js
