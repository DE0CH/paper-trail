# TEMPORARY focus workflow for the slow-runner gate failures
# (replaceCorruptPdf, editRowActions, desktopSavePickerOnClose on
# windows-11-arm; replaceCorruptPdf confirmation on macos-15-intel).
# Deleted before the branch is handed over; ci.yml carries the real wiring.

name: Focus gate-slow

on:
  # push trigger because a workflow that has never been on the default
  # branch is not registered for workflow_dispatch by filename.
  push:
    branches: ["fix-gate-slow-runners", "fix-gate-slow-runners-red"]
  workflow_dispatch:
    inputs:
      mac:
        description: also run the one macos-15-intel confirmation leg
        required: false
        default: "no"

jobs:
  winarm:
    runs-on: windows-11-arm
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build
      - name: Generate the test-fixture PDFs
        run: node build-node/tools/fixture.js
      - name: Start the web server for the browser suites
        shell: bash
        run: |
          node build-node/node/server.js 8377 &
          for i in $(seq 1 60); do
            curl -s -o /dev/null http://127.0.0.1:8377/ && break
            sleep 0.5
          done
          node build-node/tools/geometry.js
      - name: Replacing with a corrupt PDF leaves the session untouched
        if: ${{ !cancelled() }}
        shell: bash
        run: node build-node/test/replaceCorruptPdf.js
      - name: Renaming a row hides its action icons (full row width)
        if: ${{ !cancelled() }}
        shell: bash
        run: node build-node/test/editRowActions.js
      - name: DIAGNOSTIC — mark-after-rename probe
        if: ${{ !cancelled() }}
        shell: bash
        run: node build-node/test/gdbgRowMark.js
      - name: Close + Save… reaches the save-as picker (window-close path)
        if: ${{ !cancelled() }}
        shell: bash
        env:
          PT_SDC_MODE: close
          PT_SPC_NO_SKIP: 1
        run: npx electron build-node/test/desktopSavePickerOnClose.js
      - name: Quit + Save… reaches the save-as picker (quit path)
        if: ${{ !cancelled() }}
        shell: bash
        env:
          PT_SDC_MODE: quit
          PT_SPC_NO_SKIP: 1
        run: npx electron build-node/test/desktopSavePickerOnClose.js
      - name: A failing close-save surfaces and keeps the window
        if: ${{ !cancelled() }}
        shell: bash
        env:
          PT_SDC_MODE: save-fails
          PT_SPC_NO_SKIP: 1
        run: npx electron build-node/test/desktopSavePickerOnClose.js

  mac-intel:
    if: ${{ inputs.mac == 'yes' }}
    runs-on: macos-15-intel
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build
      - name: Generate the test-fixture PDFs
        run: node build-node/tools/fixture.js
      - name: Start the web server for the browser suites
        shell: bash
        run: |
          node build-node/node/server.js 8377 &
          for i in $(seq 1 60); do
            curl -s -o /dev/null http://127.0.0.1:8377/ && break
            sleep 0.5
          done
          node build-node/tools/geometry.js
      - name: Replacing with a corrupt PDF leaves the session untouched
        if: ${{ !cancelled() }}
        shell: bash
        run: node build-node/test/replaceCorruptPdf.js
      - name: Renaming a row hides its action icons (full row width)
        if: ${{ !cancelled() }}
        shell: bash
        run: node build-node/test/editRowActions.js
