# Captures what macOS actually shows for the app's file associations
# (manual trigger) so the document icons can be reviewed without
# risking a local machine's LaunchServices database. The app is
# packaged unsigned, registered with LaunchServices, made the default
# handler for .pdf/.ptl, and the icons Finder would draw are rendered
# via NSWorkspace — the same API Finder uses — plus a full-desktop
# screenshot of a Finder window on the files as secondary evidence.

name: macOS file-icon screenshot

on:
  workflow_dispatch: {}

jobs:
  screenshot:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build
      - name: Generate the test-fixture PDFs
        run: node build-node/tools/fixture.js

      - name: Package the app (unsigned, current arch only)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --mac --dir --publish never -c.mac.notarize=false

      - name: Register the app and adopt the file types
        run: |
          APP=$(find dist-electron -maxdepth 2 -name '*.app' | head -1)
          echo "APP=$APP" >> "$GITHUB_ENV"
          /System/Library/Frameworks/CoreServices.framework/Frameworks/LaunchServices.framework/Support/lsregister -f "$APP"
          brew install duti
          # pdf by its UTI (the extension form hits the same dynamic-UTI
          # error as below); ptl resolves to a dynamic UTI that duti
          # can't set (error -50) — harmless, the app is the only
          # claimant for .ptl and is therefore already its default.
          duti -s local.paper-trail com.adobe.pdf all
          duti -s local.paper-trail .ptl all || true

      - name: Render the icons macOS composes for the files
        run: |
          cp sample/WStarCats.pdf "$HOME/Desktop/Sample Paper.pdf"
          cp sample/WStarCats.ptl "$HOME/Desktop/Sample Session.ptl"
          cat > icon-shot.swift <<'EOF'
          import AppKit
          let args = CommandLine.arguments  // [_, filePath, outPath]
          let icon = NSWorkspace.shared.icon(forFile: args[1])
          icon.size = NSSize(width: 512, height: 512)
          let rep = NSBitmapImageRep(bitmapDataPlanes: nil, pixelsWide: 512,
            pixelsHigh: 512, bitsPerSample: 8, samplesPerPixel: 4,
            hasAlpha: true, isPlanar: false, colorSpaceName: .deviceRGB,
            bytesPerRow: 0, bitsPerPixel: 0)!
          NSGraphicsContext.saveGraphicsState()
          NSGraphicsContext.current = NSGraphicsContext(bitmapImageRep: rep)
          icon.draw(in: NSRect(x: 0, y: 0, width: 512, height: 512))
          NSGraphicsContext.restoreGraphicsState()
          try! rep.representation(using: .png, properties: [:])!
            .write(to: URL(fileURLWithPath: args[2]))
          EOF
          swift icon-shot.swift "$HOME/Desktop/Sample Paper.pdf" mac-icon-pdf.png
          swift icon-shot.swift "$HOME/Desktop/Sample Session.ptl" mac-icon-ptl.png
          swift icon-shot.swift "$APP" mac-icon-app.png

      - name: Screenshot a Finder window on the files
        # best effort: the icon renders above are the authoritative
        # evidence; this shows them in a real Finder window if the
        # runner's UI session allows it
        continue-on-error: true
        run: |
          open "$HOME/Desktop"
          sleep 5
          screencapture -x mac-finder.png

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mac-file-icons
          path: mac-*.png
